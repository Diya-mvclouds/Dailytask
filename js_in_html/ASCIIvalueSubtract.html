<!DOCTYPE html>
<html>
<head>
    <title>ASCII value subtraction</title>
</head>
<body>
    <h2>ASCII Subtraction</h2>
    <input type="text" id="number" placeholder="Enter a string">
    <button onclick="subtract()">Submit</button>
    <p id="output"></p>
    <script>
        function subtract(){
            let str = document.getElementById("number").value;
            let arr = str.split("");
            let b = 0;
            let c = 128;
            for(const char of arr){
                const ch = char.charCodeAt(0);
                let a = Number(ch);
                b -= a;
                if (a < c) {
                    c = a;
                }    
            }
            let result = "";
            if(b <= 0){
                result += "Smallest ASCII value: " + c + "\n";
            }
            result += "Subtraction of ASCII values: " + b;
            document.getElementById("output").innerText = result;
        }
    </script>
</body>
</html>
