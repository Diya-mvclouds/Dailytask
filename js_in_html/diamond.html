<!DOCTYPE html>
<html>
<head>
    <title>Diamond Pattern</title>
</head>
<body>
    <h2>Diamond Pattern</h2>
    <input type="number" id="num" placeholder="Enter number">
    <button onclick="diamond()">Submit</button>
    <pre id="output"></pre>
    <script>
        function diamond(){
            let n = document.getElementById("num").value;
            let result = "";
            for(let i = 0; i <= n; i++){
                let row = "";
                for(let j = 0; j < n - i; j++){
                    row += "  ";
                }
                row += "* "
                for(let j = 1; j <= i; j++){
                    row += i + " * ";
                }
                result += row + "\n";
            }
            for(let i = n - 1; i >= 0; i--){
                let row = "";
                for(let j = 0; j < n - i; j++){
                    row += "  ";
                }
                row += "* ";
                for(let j = 1; j <= i; j++){
                    row += i + " * ";
                }
                result += row + "\n";
            }
            document.getElementById("output").innerText = result;
        }
    </script>
</body>
</html>
