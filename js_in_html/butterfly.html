<!DOCTYPE html>
<html>
<head>
    <title>Butterfly Pattern</title>
</head>
<body>
    <h2>Butterfly Pattern</h2>
    <input type="number" id="num" placeholder="Enter number">
    <button onclick="butterfly()">Submit</button>
    <pre id="output"></pre>
    <script>
        function butterfly(){
            let n = document.getElementById("num").value;
            let result = "";
            for (let i = 1; i <= n; i++) {
                let row = "";
                for (let j = 1; j <= i; j++) {
                    if (j == 1 || j == i) {
                        row += "* ";
                    } else {
                        row += "  ";
                    }
                }
                for (let j = 1; j <= 2 * (n - i); j++) {
                    row += "  ";
                }
                for (let j = 1; j <= i; j++) {
                    if (j == 1 || j == i) {
                        row += "* ";
                    } else {
                        row += "  ";
                    }
                }
                result += row + "\n";
            }

            for (let i = n - 1; i >= 1; i--) {
                let row = "";
                for (let j = 1; j <= i; j++) {
                    if (j == 1 || j == i) {
                        row += "* ";
                    } else {
                        row += "  ";
                    }
                }
                for (let j = 1; j <= 2 * (n - i); j++) {
                    row += "  ";
                }
                for (let j = 1; j <= i; j++) {
                    if (j == 1 || j == i) {
                        row += "* ";
                    } else {
                        row += "  ";
                    }
                }
                result += row + "\n";
            }
            document.getElementById("output").innerText = result;
        }
    </script>
</body>
</html>
