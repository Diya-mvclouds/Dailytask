<!DOCTYPE html>
<html>
<head>
    <title>Factors of numbers</title>
</head>
<body>
    <h2>Enter a Number</h2>
    <input type="number" id="number" placeholder="Enter number">
    <button onclick="factors()">Submit</button>
    <p id="output"></p>
    <script>
        function factors() {
            let n = document.getElementById("number").value;
            const result = [];
            for (let i = 1; i <=n; i++){
                if (n % i == 0){
                    result.push(i);
                }
            }
            document.getElementById("output").innerText = "Factors: \n" + result;
        }
    </script>
</body>
</html>
