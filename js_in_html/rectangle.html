<!DOCTYPE html>
<html>
<head>
    <title>Rectangle Pattern</title>
</head>
<body>
    <h2>Rectangle Pattern</h2>
    <input type="number" id="num" placeholder="Enter number">
    <button onclick="rectangle()">Submit</button>
    <pre id="output"></pre>
    <script>
        function rectangle(){
            let n = document.getElementById("num").value;
            let result = "";
            for(let i = 1; i <= n; i++){
                let row = "";
                for(let j = 1; j <= n - i; j++){
                    row += " ";
                }
                for(let k = 1; k <= n; k++){
                    if (i == 1 || k == 1 || i == n || k == n) {
                        row += "*";
                    } 
                    else {
                        row += " ";
                    }
                }
                result += row + "\n";
            }
            document.getElementById("output").innerText = result;
        }
    </script>
</body>
</html>
