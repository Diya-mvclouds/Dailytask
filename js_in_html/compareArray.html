<!DOCTYPE html>
<html>
<head>
    <title>Compare Array</title>
</head>
<body>
    <h2>Enter a Number</h2>
    <input type="text" id="arr1" placeholder="Enter number"><br><br>
    <input type="text" id="arr2" placeholder="Enter number"><br><br>
    <button onclick="compare()">Submit</button>
    <p id="output"></p>
    <script>
        function compare() {
            let n1 = document.getElementById("arr1").value;
            let arr1 = n1.split(" ");
            let n2 = document.getElementById("arr2").value;
            let arr2 = n2.split(" ");
            let x = "";
            for(let i = 0; i <= arr2.length; i++){
                let diff = false;
                for(let j = 0; j <= arr1.length; j++){
                    if(arr1[j] == arr2[i]){
                        diff = true
                    }
                }
                if(!diff){
                    x += arr2[i] + " "; 
                }
            }

            let y = "";
            for(let i = 0; i <= arr1.length; i++){
                let diff = false;
                for(let j = 0; j <= arr2.length; j++){
                    if(arr1[i] == arr2[j]){
                        diff = true;
                    }
                }
                if(!diff){
                    y += arr1[i] + " ";
                }
            }
            document.getElementById("output").innerText = "Elements not in array 1: " + x + "\nElements not in array 2: " + y;
        }
    </script>
</body>
</html>
