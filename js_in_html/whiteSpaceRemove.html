<!DOCTYPE html>
<html>
<head>
    <title>WhiteSpace Remove</title>
</head>
<body>
    <h2>Write something</h2>
    <input type="text" id="text" placeholder="Write anything">
    <button onclick="whitespace()">Submit</button>
    <p id="output"></p>
    <script>
    function whitespace() {
        let str = document.getElementById("text").value;
        let result = "";
        for (let i = 0; i < str.length; i++){
            if (str[i] != ' '){
                result += str[i];
            }
        }
        document.getElementById("output").innerText = "Output: " + result;
    }
    </script>
</body>
</html>
