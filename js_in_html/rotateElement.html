<!DOCTYPE html>
<html>
<head>
    <title>Reverse array</title>
</head>
<body>
    <h2>Enter numbers</h2>
    <input type="text" id="text" placeholder="Enter numbers">
    <button onclick="array()">Submit</button>
    <p id="x"></p>
    <p id="oddsum"></p>
    <p id="evensum"></p>
    <p id="output"></p>
    <script>
    function array() {
        let a = document.getElementById("text").value;
        let arr = a.split(" ");
        let r = [];
        let odd = [];
        let even = [];
        let oddsum = 0;
        let evensum = 0;
        let result = ""
        for (let i = arr.length - 1; i >= 0; i--) {
            let a = Number(arr[i]);
            if(a % 2 == 0){
                even += a;
                evensum += a;
            }
            else{
                odd += a;
                oddsum += a;
            }
        }
        r += odd + even;
        let x = r.split("");
        document.getElementById("x").innerText ="Reverse array as per odd even: " + x;
        console.log(oddsum);
        document.getElementById("oddsum").innerText = "Odd numbers sum: " + oddsum;
        console.log(evensum);
        document.getElementById("evensum").innerText = "Even numbers sum: " + evensum;
        if(oddsum > 10){
            result += "\n" + "Output 1";
        }
        if(evensum > 10){
            result += "\n" + "Output 2";
        }
        document.getElementById("output").innerText = "Output: " + result;
    }
    </script>
</body>
</html>
