<!DOCTYPE html>
<html>
<head>
    <title>Swastik Pattern</title>
</head>
<body>
    <h2>Swastik Pattern</h2>
    <input type="number" id="num" placeholder="Enter odd number">
    <button onclick="swastik()">Submit</button>
    <pre id="output"></pre>
    <script>
        function swastik(){
            let n = document.getElementById("num").value;
            let result = "";
            let mid = Math.floor(n/2);
            for(let i = 0; i < n; i++){
                let row = "";
                for(let j = 0; j < n; j++){
                    if(i == mid || j == mid ||
                    i == 0 && j > mid ||
                    j == 0 && i < mid ||
                    i == n - 1 && j < mid ||
                    j == n - 1 && i > mid
                    ){
                        row += "* ";
                    }
                    else{
                        row += "  "
                    }
                }
                result += row + "\n";
            }
            document.getElementById("output").innerText = result;
        }
    </script>
</body>
</html>
