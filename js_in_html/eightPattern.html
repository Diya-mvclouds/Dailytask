<!DOCTYPE html>
<html>
<head>
    <title>Eight Pattern</title>
</head>
<body>
    <h2>Eight Pattern</h2>
    <input type="number" id="num" placeholder="Enter odd number">
    <button onclick="eight()">Submit</button>
    <pre id="output"></pre>
    <script>
        function eight(){
            let n = document.getElementById("num").value;
            let result = "";
            let width = Math.floor(n/2);
            for (let i = 0; i < n; i++) {
                let row = " ";
                for (let j = 0; j <= width; j++){
                    if ((i == 0 || i == n - 1 || i == Math.floor(n / 2)) && (j > 0 && j < width - 1)) {
                        row += "* ";
                    } 
                    else if ((j == 0 || j == width - 1) && (i != 0 && i != n - 1 && i != Math.floor(n / 2))) {
                        row += "* ";
                    } 
                    else {
                        row += "  ";
                    }
                }
                result += row + "\n";
            }
            document.getElementById("output").innerText = result;
        }
    </script>
</body>
</html>
