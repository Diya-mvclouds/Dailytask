<!DOCTYPE html>
<html>
<head>
    <title>Sort in Alphabetic order</title>
</head>
<body>
    <h2>Enter sentence</h2>
    <input type="text" id="text" placeholder="Write anything"><br><br>
    <button onclick="sort()">Submit</button>
    <p id="output"></p>
    <script>
        function sort() {
            let str = document.getElementById("text").value;
            let arr = str.split("");
            for (let i = 0; i < arr.length; i++) {
                for (let j = 0; j < arr.length - 1; j++) {
                    if (arr[j] > arr[j + 1]) {
                        let a = arr[j];
                        arr[j] = arr[j + 1];
                        arr[j + 1] = a;
                    }   
                }    
            }
            document.getElementById("output").innerText = "Output: " + arr.join("");
        }
    </script>
</body>
</html>
