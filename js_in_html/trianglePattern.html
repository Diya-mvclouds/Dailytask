<!DOCTYPE html>
<html>
<head>
    <title>Triangle Pattern</title>
</head>
<body>
    <h2>Triangle Pattern</h2>
    <input type="number" id="num" placeholder="Enter number">
    <button onclick="triangle()">Submit</button>
    <pre id="output"></pre>
    <script>
        function triangle(){
            let n = document.getElementById("num").value;
            let result = "";
            for (let i = 1; i <= n; i++) {
                let row = "";
                for (let j = 0; j < 2 * (n - i); j++) {
                    row += " ";
                }
                for (let j = 0; j < i; j++) {
                    row += "* ";
                }
                result += row + "\n";
            }
            document.getElementById("output").innerText = result;
        }
    </script>
</body>
</html>
